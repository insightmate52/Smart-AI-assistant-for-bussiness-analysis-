{% extends "base.html" %}
{% block content %}

<h3>Chat Assistant</h3>

<div id="chat-box" class="mb-3"></div>

<input id="chat-input" class="form-control" placeholder="Ask something">
<button onclick="send()" class="btn btn-primary mt-2">Send</button>

<script>
function send(){
  let q=document.getElementById("chat-input").value;

  fetch("/chat/ask",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:q})
  })
  .then(r=>r.json())
  .then(d=>{
    document.getElementById("chat-box").innerHTML+=
      "<p><b>You:</b>"+q+"</p><p><b>AI:</b>"+d.answer+"</p>";
  });
}
</script>

<a href="/upload_page" class="btn btn-secondary mt-4">Back to Home</a>

{% endblock %}
