{% extends "base.html" %}
{% block content %}

<h3>Estimation</h3>

<select id="targetCol" class="form-control mb-3">
  {% for col in dataset_summary.columns %}
    <option value="{{ col }}">{{ col }}</option>
  {% endfor %}
</select>

<button onclick="trainModel()" class="btn btn-warning mb-3">Train Model</button>

<input id="horizon" type="number" value="3" class="form-control mb-2">

<button onclick="runEstimation()" class="btn btn-success">Run</button>

<pre id="output"></pre>

<script>
async function trainModel(){
  const target=document.getElementById("targetCol").value;
  const res=await fetch("/train_forecast",{method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({target})});
  const data=await res.json();
  alert(data.status||data.error);
}

async function runEstimation(){
  const h=Number(document.getElementById("horizon").value);
  const res=await fetch("/forecast",{method:"POST",
  headers:{"Content-Type":"application/json"},
  body:JSON.stringify({horizon:h})});
  const data=await res.json();
  document.getElementById("output").textContent=JSON.stringify(data,null,2);
}
</script>

<a href="/download_full_report" class="btn btn-danger mt-3">Generate Full Report</a>
<a href="/upload_page" class="btn btn-secondary mt-2">Back to Home</a>

{% endblock %}
