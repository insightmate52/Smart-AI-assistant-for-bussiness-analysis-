{% extends "base.html" %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-3">
  <h2>Upload Dataset</h2>
  <a href="/logout" class="btn btn-danger">Logout</a>
</div>

<form action="{{ url_for('upload') }}" method="post" enctype="multipart/form-data">
  <input type="file" name="file" class="form-control mb-3" required>
  <button class="btn btn-primary">Upload</button>
</form>

<hr>

<div class="row mt-4 text-center">

  <div class="col-md-3">
    <div class="card p-3">
      <h5>Analyze</h5>
      <a href="/analyze" class="btn btn-primary w-100">Open</a>
    </div>
  </div>

  <div class="col-md-3">
    <div class="card p-3">
      <h5>Insights</h5>
      <a href="/insights" class="btn btn-primary w-100">Open</a>
    </div>
  </div>

  <div class="col-md-3">
    <div class="card p-3">
      <h5>Chat</h5>
      <a href="/chat" class="btn btn-primary w-100">Open</a>
    </div>
  </div>

  <div class="col-md-3">
    <div class="card p-3">
      <h5>Estimation</h5>
      <a href="/estimate" class="btn btn-primary w-100">Open</a>
    </div>
  </div>

</div>

{% endblock %}
