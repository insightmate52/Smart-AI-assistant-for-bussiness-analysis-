{% extends "base.html" %}
{% block content %}

<h3>Textual Insights</h3>

{% if dataset_summary and dataset_summary.text_insights %}
  
  {% for i in dataset_summary.text_insights %}
    <div class="card p-3 mb-3">
      {{ i }}
    </div>
  {% endfor %}

{% else %}

  <div class="card p-3">
    No insights available. Please upload and analyze a dataset first.
  </div>

{% endif %}

<hr>

<!-- Chat -->
<input id="question" class="form-control" placeholder="Ask about insights">
<button onclick="ask()" class="btn btn-primary mt-2">Ask</button>

<div id="response" class="mt-3"></div>

<script>
function ask(){
  const q = document.getElementById("question").value;

  if(!q){
    alert("Please enter a question");
    return;
  }

  fetch("/chat/ask", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({message:q})
  })
  .then(r=>r.json())
  .then(d=>{
    document.getElementById("response").innerText =
      d.answer || d.error || "No response";
  })
  .catch(()=>{
    document.getElementById("response").innerText = "Error contacting assistant";
  });
}
</script>

<a href="/insights" class="btn btn-secondary mt-4">Back</a>

{% endblock %}
